<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP (defense-in-depth) — self + Google Fonts + data/blob (canvas/รูป) -->
    <!-- style-src ต้องมี 'unsafe-inline' เพราะแอพใช้ inline style={...} จำนวนมาก
         และ PWA/Tailwind inject สไตล์; ไม่มี eval/inline script (script-src 'self') -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#131316" />
    <meta
      name="description"
      content="Pocketo（ポケット）— จดรายรับรายจ่ายแบบ kakeibo พร้อมกล่องเงินและคำนวณภาษีไทย ข้อมูลอยู่ในเครื่องคุณเท่านั้น"
    />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pocketo" />
    <meta property="og:title" content="Pocketo — ポケット" />
    <meta
      property="og:description"
      content="จดรายรับรายจ่ายแบบ kakeibo · แบ่งกล่องเงิน · คำนวณภาษีไทย · ข้อมูลอยู่ในเครื่องคุณเท่านั้น"
    />
    <meta property="og:url" content="https://tasachii.github.io/Pocketo/" />
    <meta property="og:image" content="https://tasachii.github.io/Pocketo/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pocketo — ポケット" />
    <meta
      name="twitter:description"
      content="จดรายรับรายจ่ายแบบ kakeibo · แบ่งกล่องเงิน · คำนวณภาษีไทย · ข้อมูลอยู่ในเครื่องคุณเท่านั้น"
    />
    <meta name="twitter:image" content="https://tasachii.github.io/Pocketo/og.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Pocketo — ポケット</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
